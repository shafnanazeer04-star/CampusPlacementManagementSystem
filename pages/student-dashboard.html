<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">Student Dashboard</span>
        <button class="btn btn-danger btn-sm">Logout</button>
    </div>
</nav>

<div class="container mt-4">

    <h2>Welcome Student</h2>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Available Jobs</h5>
                    <h2>15</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Applications</h5>
                    <h2>3</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Interviews</h5>
                    <h2>1</h2>
                </div>
            </div>
        </div>

    </div>

    <h3 class="mt-5">Latest Jobs</h3>

    <table class="table table-bordered mt-3">
        <thead class="table-dark">
            <tr>
                <th>Company</th>
                <th>Job Title</th>
                <th>Location</th>
                <th>Apply</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>ABC Tech</td>
                <td>Software Intern</td>
                <td>Colombo</td>
                <td><button class="btn btn-success btn-sm">Apply</button></td>
            </tr>

            <tr>
                <td>XYZ Solutions</td>
                <td>Web Developer</td>
                <td>Kandy</td>
                <td><button class="btn btn-success btn-sm">Apply</button></td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
