<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Company Dashboard</span>
        <button class="btn btn-danger btn-sm">Logout</button>
    </div>
</nav>

<div class="container mt-4">

    <h2>Post a New Job</h2>

    <div class="card shadow p-4 mt-3">

        <form>

            <div class="mb-3">
                <label class="form-label">Job Title</label>
                <input type="text" class="form-control" placeholder="Software Engineer">
            </div>

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Required Skills</label>
                <input type="text" class="form-control" placeholder="Java, Spring Boot">
            </div>

            <div class="mb-3">
                <label class="form-label">Salary</label>
                <input type="text" class="form-control" placeholder="50000">
            </div>

            <button class="btn btn-success">Post Job</button>

        </form>

    </div>

    <h3 class="mt-5">Posted Jobs</h3>

    <table class="table table-bordered mt-3">

        <thead class="table-dark">
            <tr>
                <th>Job Title</th>
                <th>Skills</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td>Software Intern</td>
                <td>Java, MySQL</td>
                <td>Open</td>
            </tr>

            <tr>
                <td>Frontend Developer</td>
                <td>HTML, CSS, JavaScript</td>
                <td>Open</td>
            </tr>

        </tbody>

    </table>

</div>

</body>

</html>
